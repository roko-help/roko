  <style>
    :root {
      --bg: #0a0f14;
      --bg-card: #111820;
      --accent: #f0b866;
      --accent-a15: rgba(240,184,102,.15);
      --accent-a30: rgba(240,184,102,.3);
      --accent-a40: rgba(240,184,102,.4);
      --success: #34d399;
      --danger: #f87171;
      --yellow: #fbbf24;
      --text: #e8ecf0;
      --text-dim: rgba(255,255,255,.55);
      --text-dimmer: rgba(255,255,255,.35);
      --border: rgba(255,255,255,.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== LAYOUT ===== */
    .app {
      height: 100%; display: flex; flex-direction: column;
      max-width: 680px; margin: 0 auto;
      position: relative;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1.2rem; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(10,15,20,.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 100;
    }
    .header-back {
      color: var(--accent); text-decoration: none; font-size: .85rem;
      font-weight: 600; display: flex; align-items: center; gap: .3rem;
      transition: opacity .2s;
    }
    .header-back:hover { opacity: .7; }
    .header-back svg { width: 16px; height: 16px; }
    .header-title {
      font-size: .9rem; font-weight: 700; letter-spacing: -.01em;
    }
    .lang-sw {
      display: flex; gap: 2px; background: rgba(255,255,255,.05);
      border-radius: 8px; padding: 2px;
    }
    .lang-btn {
      background: none; border: none; color: var(--text-dimmer);
      font-family: inherit; font-size: .75rem; font-weight: 600;
      padding: .3rem .5rem; border-radius: 6px; cursor: pointer;
      transition: all .2s; text-transform: uppercase;
    }
    .lang-btn.active {
      background: rgba(255,255,255,.1); color: var(--text);
    }
    .lang-btn:hover:not(.active) { color: var(--text-dim); }

    /* ===== PROGRESS DOTS ===== */
    .progress {
      display: flex; gap: 6px; justify-content: center;
      padding: .8rem 1rem .4rem; flex-shrink: 0;
    }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.1);
      transition: all .4s ease;
    }
    .dot.done { background: var(--success); border-color: var(--success); box-shadow: 0 0 10px rgba(52,211,153,.3); }
    .dot.fail { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 10px rgba(248,113,113,.3); }
    .dot.current {
      background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-a40);
      transform: scale(1.15);
    }
    .progress-label {
      text-align: center; font-size: .75rem; color: var(--text-dimmer);
      padding-bottom: .5rem; font-weight: 500;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 1rem 1rem .5rem;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ===== CHAT MESSAGES ===== */
    .msg {
      display: flex; gap: .55rem; align-items: flex-end;
      margin-bottom: .5rem; max-width: 88%;
      opacity: 0; transform: translateY(12px);
      animation: msgIn .35s ease forwards;
    }
    .msg.them { justify-content: flex-start; }
    .msg.you { flex-direction: row-reverse; margin-left: auto; }

    @keyframes msgIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; flex-shrink: 0;
      font-weight: 700; color: #fff;
    }
    .msg.them .msg-avatar { background: linear-gradient(135deg, #5b6eae, #8b5cf6); }
    .msg.you .msg-avatar { background: linear-gradient(135deg, #e09422, #d4791a); }

    .msg-content { display: flex; flex-direction: column; gap: 1px; }
    .msg.you .msg-content { align-items: flex-end; }

    .msg-name {
      font-size: .7rem; font-weight: 600; color: var(--text-dimmer);
      padding: 0 .6rem; margin-bottom: 2px;
    }
    .msg.them .msg-name { color: #8b9dc3; }
    .msg.you .msg-name { color: var(--accent); opacity: .7; }

    .bubble {
      padding: .6rem .85rem; font-size: .9rem; line-height: 1.45;
      color: rgba(255,255,255,.85); max-width: 100%;
      word-wrap: break-word;
    }
    .msg.them .bubble {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 4px 16px 16px 16px;
    }
    .msg.you .bubble {
      background: linear-gradient(135deg, rgba(240,184,102,.18), rgba(240,184,102,.1));
      border: 1px solid rgba(240,184,102,.15);
      border-radius: 16px 4px 16px 16px;
    }

    /* consecutive msgs from same side: tighter spacing, no avatar */
    .msg.them + .msg.them { margin-top: -.15rem; }
    .msg.you + .msg.you { margin-top: -.15rem; }
    .msg.them + .msg.them .msg-avatar { visibility: hidden; }
    .msg.them + .msg.them .msg-name { display: none; }
    /* but show avatar/name when the name changes */
    .msg.them.new-sender .msg-avatar { visibility: visible; }
    .msg.them.new-sender .msg-name { display: block; }
    .msg.them.new-sender { margin-top: .6rem; }

    /* ===== CHOICES (bottom panel) ===== */
    .choices-panel {
      flex-shrink: 0; padding: .6rem 1rem 1rem;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      display: flex; flex-direction: column; gap: .45rem;
    }
    .choice-btn {
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 14px; padding: .75rem 1rem;
      cursor: pointer; font-family: inherit; font-size: .9rem;
      color: rgba(255,255,255,.75); text-align: left;
      transition: all .2s ease; -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:hover {
      border-color: var(--accent-a40);
      background: var(--accent-a15); color: #fff;
    }
    .choice-btn:active { transform: scale(.98); }
    .choice-btn.correct {
      border-color: var(--success); background: rgba(52,211,153,.1);
      color: var(--success); pointer-events: none;
    }
    .choice-btn.wrong {
      border-color: var(--danger); background: rgba(248,113,113,.08);
      color: var(--danger); pointer-events: none;
      opacity: .7;
    }
    .choice-btn.dimmed { opacity: .35; pointer-events: none; }

    /* ===== FEEDBACK CARD ===== */
    .feedback {
      margin: .8rem 0; padding: 1rem; border-radius: 14px;
      display: flex; gap: .7rem; align-items: flex-start;
      opacity: 0; animation: feedIn .4s ease .15s forwards;
    }
    @keyframes feedIn { to { opacity: 1; } }
    .feedback.good { background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.18); }
    .feedback.bad { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.18); }
    .feedback-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; }
    .feedback-text { font-size: .88rem; color: rgba(255,255,255,.7); line-height: 1.5; }

    .next-btn {
      background: var(--accent); color: #0a0f14; border: none;
      border-radius: 12px; padding: .75rem 1.5rem; font-family: inherit;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: all .2s; align-self: flex-end;
      margin-top: .3rem;
    }
    .next-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .next-btn:active { transform: scale(.97); }

    /* ===== START SCREEN ===== */
    .screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
      transition: opacity .45s ease, transform .45s ease;
      z-index: 50;
    }
    .screen.hidden {
      opacity: 0; transform: scale(.96);
      pointer-events: none;
    }
    .screen.visible {
      opacity: 1; transform: scale(1);
    }

    .start-raccoon {
      animation: raccoonBounce 2s ease-in-out infinite;
      margin-bottom: 1rem;
    }
    .start-raccoon video {
      width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; border: 3px solid rgba(255,255,255,.15);
      box-shadow: 0 0 60px rgba(240,184,102,.15);
    }
    @keyframes raccoonBounce {
      0%, 100% { transform: translateY(0) rotate(0); }
      25% { transform: translateY(-8px) rotate(-3deg); }
      75% { transform: translateY(-4px) rotate(3deg); }
    }
    .start-title {
      font-size: 2.2rem; font-weight: 800; letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--accent), #e8d5b7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: .5rem;
    }
    .start-sub {
      font-size: 1rem; color: var(--text-dim); text-align: center;
      max-width: 320px; line-height: 1.55; margin-bottom: 2rem;
    }
    .start-btn {
      background: var(--accent); color: #0a0f14; border: none;
      border-radius: 16px; padding: 1rem 3rem; font-family: inherit;
      font-size: 1.15rem; font-weight: 800; cursor: pointer;
      letter-spacing: -.01em;
      box-shadow: 0 4px 24px rgba(240,184,102,.25), 0 0 0 1px rgba(240,184,102,.3);
      transition: all .25s ease;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(240,184,102,.35), 0 0 0 1px rgba(240,184,102,.4);
    }
    .start-btn:active { transform: scale(.96); }
    .start-footer {
      position: absolute; bottom: 1.5rem;
      font-size: .78rem; color: var(--text-dimmer);
    }
    .start-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* ===== FINAL SCREEN ===== */
    .final { text-align: center; }
    .final-raccoon { margin-bottom: .5rem; }
    .final-raccoon video {
      width: 100px; height: 100px; border-radius: 50%;
      object-fit: cover; border: 3px solid rgba(255,255,255,.15);
      box-shadow: 0 0 40px rgba(240,184,102,.12);
    }
    .final-score {
      font-size: 3.5rem; font-weight: 800; letter-spacing: -.03em;
      margin-bottom: .3rem;
    }
    .final-score.good { color: var(--success); }
    .final-score.ok { color: var(--yellow); }
    .final-score.bad { color: var(--danger); }
    .final-msg {
      font-size: 1rem; color: var(--text-dim);
      max-width: 340px; margin: 0 auto 1.5rem; line-height: 1.55;
    }
    .final-btns {
      display: flex; flex-direction: column; gap: .5rem;
      width: 100%; max-width: 300px; margin: 0 auto;
    }
    .final-btn {
      border: none; border-radius: 14px; padding: .85rem 1.2rem;
      font-family: inherit; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .2s; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .final-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .final-btn:active { transform: scale(.97); }
    .final-btn.primary {
      background: var(--accent); color: #0a0f14;
      box-shadow: 0 4px 20px rgba(240,184,102,.2);
    }
    .final-btn.secondary {
      background: rgba(255,255,255,.06); color: var(--text);
      border: 1px solid var(--border);
    }
    .final-btn.ghost {
      background: transparent; color: var(--accent);
      font-weight: 600; font-size: .88rem;
    }
    .copied-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--success); color: #0a0f14; font-weight: 700;
      padding: .6rem 1.5rem; border-radius: 12px; font-size: .88rem;
      z-index: 999; opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    .copied-toast.show { opacity: 1; }

    /* ===== GAME VIEW (header + progress + chat + choices) ===== */
    .game-view {
      display: flex; flex-direction: column; height: 100%;
    }
    .game-view.hidden { display: none; }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 681px) {
      .app {
        margin-top: 1rem; margin-bottom: 1rem;
        border-radius: 24px;
        border: 1px solid var(--border);
        height: calc(100% - 2rem);
        box-shadow: 0 0 80px rgba(0,0,0,.5);
      }
    }
    @media (max-width: 380px) {
      .start-title { font-size: 1.8rem; }
      .start-sub { font-size: .9rem; }
      .bubble { font-size: .85rem; }
      .choice-btn { font-size: .85rem; padding: .65rem .85rem; }
      .dot { width: 12px; height: 12px; }
    }

    /* ===== SUBTLE BG PATTERN ===== */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(240,184,102,.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .app { position: relative; z-index: 1; }
  </style>
</head>

// ============================================================
// STATE
// ============================================================
let curLang = 'en';
let state = { step: 0, score: 0, results: [], answered: false };

// ============================================================
// INIT
// ============================================================
(function init() {
  // detect language
  const nav = (navigator.language || '').slice(0, 2).toLowerCase();
  if (nav === 'ru') curLang = 'ru';
  else if (nav === 'es') curLang = 'es';

  // check URL param
  const params = new URLSearchParams(location.search);
  if (params.get('lang') && UI[params.get('lang')]) curLang = params.get('lang');

  renderLangSwitchers();
  applyLang();
})();

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function tr(key) { return (UI[curLang] || UI.en)[key] || UI.en[key] || key; }

function renderLangSwitchers() {
  const langs = ['en','ru','es'];
  const html = langs.map(l =>
    `<button class="lang-btn ${l===curLang?'active':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`
  ).join('');
  document.getElementById('langSw').innerHTML = html;
  document.getElementById('startLangSw').innerHTML = html;
}

function setLang(l) {
  curLang = l;
  renderLangSwitchers();
  applyLang();
  // if in game, re-render current step
  if (!document.getElementById('gameView').classList.contains('hidden')) {
    if (state.step >= (SCENARIOS[curLang]||SCENARIOS.en).length) {
      renderFinal();
    } else {
      renderStep();
    }
  }
}

function applyLang() {
  document.getElementById('startSub').textContent = tr('sub');
  document.getElementById('startBtn').textContent = tr('start');
  document.getElementById('headerTitle').textContent = tr('title');
  document.documentElement.lang = curLang;
}

// ============================================================
// AVATAR COLORS
// ============================================================
const AVATAR_COLORS = [
  'linear-gradient(135deg, #5b6eae, #8b5cf6)',
  'linear-gradient(135deg, #e05a5a, #c0392b)',
  'linear-gradient(135deg, #2ecc71, #1abc9c)',
  'linear-gradient(135deg, #e67e22, #d35400)',
  'linear-gradient(135deg, #3498db, #2980b9)',
  'linear-gradient(135deg, #9b59b6, #8e44ad)',
  'linear-gradient(135deg, #1abc9c, #16a085)',
];

function getAvatarColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function getInitial(name) {
  if (name.startsWith('@')) return name[1].toUpperCase();
  return name[0].toUpperCase();
}

// ============================================================
// GAME FLOW
// ============================================================
// Fisher-Yates shuffle with synced order across languages
let shuffledOrder = null;
function shuffleOrder(len) {
  const arr = Array.from({length: len}, (_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  const lang = SCENARIOS[curLang] ? curLang : 'en';
  shuffledOrder = shuffleOrder(SCENARIOS[lang].length);
  state = { step: 0, score: 0, results: [], answered: false };
  document.getElementById('startScreen').classList.remove('visible');
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('finalScreen').classList.add('hidden');
  document.getElementById('gameView').classList.remove('hidden');
  // hide start lang sw, show game lang sw
  document.getElementById('startLangSw').parentElement.style.display = 'none';
  renderStep();
}

function renderStep() {
  state.answered = false;
  const lang = SCENARIOS[curLang] ? curLang : 'en';
  const scenarios = SCENARIOS[lang];
  const total = scenarios.length;

  if (state.step >= total) { renderFinal(); return; }

  const s = scenarios[shuffledOrder[state.step]];

  // Progress dots
  const dotsHtml = scenarios.map((_, i) => {
    if (i < state.step) return `<div class="dot ${state.results[i] ? 'done' : 'fail'}"></div>`;
    if (i === state.step) return `<div class="dot current"></div>`;
    return `<div class="dot"></div>`;
  }).join('');
  document.getElementById('progress').innerHTML = dotsHtml;
  document.getElementById('progressLabel').textContent =
    `${tr('scenario')} ${state.step + 1} ${tr('of')} ${total}`;

  // Chat messages with staggered animation
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '';

  let prevName = null;
  s.chat.forEach((m, i) => {
    const isNewSender = m.from === 'them' && m.name !== prevName;
    const div = document.createElement('div');
    div.className = `msg ${m.from}${isNewSender ? ' new-sender' : ''}`;
    div.style.animationDelay = `${i * 200 + 100}ms`;

    if (m.from === 'them') {
      const color = getAvatarColor(m.name);
      div.innerHTML = `
        <div class="msg-avatar" style="background:${color}">${getInitial(m.name)}</div>
        <div class="msg-content">
          ${isNewSender || i === 0 ? `<div class="msg-name">${esc(m.name)}</div>` : ''}
          <div class="bubble">${esc(m.text)}</div>
        </div>`;
      prevName = m.name;
    } else {
      div.innerHTML = `
        <div class="msg-avatar" style="background:url('raccoon-poster.jpg') center/cover; border:1.5px solid rgba(240,184,102,.3)"></div>
        <div class="msg-content">
          ${i === 0 || s.chat[i-1].from !== 'you' ? `<div class="msg-name">${tr('you')}</div>` : ''}
          <div class="bubble">${esc(m.text)}</div>
        </div>`;
      prevName = null;
    }
    chatArea.appendChild(div);
  });

  // Scroll chat to bottom after animations
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, s.chat.length * 200 + 200);

  // Choices
  const choicesPanel = document.getElementById('choicesPanel');
  const totalDelay = s.chat.length * 200 + 300;
  choicesPanel.innerHTML = s.choices.map((c, i) =>
    `<button class="choice-btn" onclick="answer(${i})" style="opacity:0;animation:msgIn .35s ease ${totalDelay + i * 100}ms forwards">${esc(c.text)}</button>`
  ).join('');
}

function answer(idx) {
  if (state.answered) return;
  state.answered = true;

  const lang = SCENARIOS[curLang] ? curLang : 'en';
  const s = SCENARIOS[lang][shuffledOrder[state.step]];
  const correct = s.choices[idx].correct;

  state.results.push(correct);
  if (correct) state.score++;

  // Highlight buttons
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    if (i === idx) {
      btn.classList.add(correct ? 'correct' : 'wrong');
    } else if (s.choices[i].correct) {
      btn.classList.add('correct');
    } else {
      btn.classList.add('dimmed');
    }
  });

  // Update progress dot
  const dots = document.querySelectorAll('.dot');
  if (dots[state.step]) {
    dots[state.step].classList.remove('current');
    dots[state.step].classList.add(correct ? 'done' : 'fail');
    if (dots[state.step + 1]) dots[state.step + 1].classList.add('current');
  }

  // Show feedback in chat area
  const chatArea = document.getElementById('chatArea');
  const feedDiv = document.createElement('div');
  feedDiv.className = `feedback ${correct ? 'good' : 'bad'}`;
  feedDiv.innerHTML = `
    <div class="feedback-icon">${correct ? '<img src="raccoon-poster.jpg" style="width:2.5rem;height:2.5rem;border-radius:50%;object-fit:cover">' : '😰'}</div>
    <div class="feedback-text">${correct ? s.good : s.bad}</div>
  `;
  chatArea.appendChild(feedDiv);
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 200);

  // Add "Next" button to choices panel
  const choicesPanel = document.getElementById('choicesPanel');
  const total = SCENARIOS[lang].length;
  const nextLabel = state.step < total - 1 ? `${tr('next')} \u2192` : `${tr('results')} \u2192`;
  const nextDiv = document.createElement('div');
  nextDiv.style.cssText = 'display:flex;justify-content:flex-end;margin-top:.3rem';
  nextDiv.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>`;
  choicesPanel.appendChild(nextDiv);
}

function nextStep() {
  state.step++;
  renderStep();
}

function renderFinal() {
  document.getElementById('gameView').classList.add('hidden');
  const finalEl = document.getElementById('finalScreen');
  finalEl.classList.remove('hidden');
  finalEl.classList.add('visible');

  const lang = SCENARIOS[curLang] ? curLang : 'en';
  const total = SCENARIOS[lang].length;
  const pct = Math.round(state.score / total * 100);
  const cls = pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad';

  const msg = pct >= 80 ? tr('great') : pct >= 50 ? tr('ok') : tr('bad');

  // Result dots summary
  const dotsHtml = state.results.map((r, i) =>
    `<div class="dot ${r ? 'done' : 'fail'}"></div>`
  ).join('');

  const liked = localStorage.getItem('roko_quest_liked') === '1';
  finalEl.innerHTML = `
    <div class="final">
      <div class="final-raccoon"><video src="raccoon.mp4" poster="raccoon-poster.jpg" muted playsinline loop autoplay></video></div>
      <div class="final-score ${cls}">${state.score}/${total}</div>
      <div class="progress" style="margin:1rem 0">${dotsHtml}</div>
      <div class="final-msg">${msg}</div>
      <div style="font-size:.82rem;color:var(--text-dimmer);margin-bottom:.8rem">${tr('like_q')}</div>
      <div style="display:flex;gap:.6rem;justify-content:center;margin-bottom:1.2rem">
        <button id="questLikeBtn" onclick="questLike()" style="background:none;border:2px solid ${liked?'var(--danger)':'rgba(255,255,255,.15)'};border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;transition:all .3s">${liked?'❤️':'🤍'}</button>
        <a href="https://t.me/roko_help" target="_blank" style="display:flex;align-items:center;justify-content:center;background:none;border:2px solid rgba(255,255,255,.15);border-radius:50%;width:44px;height:44px;font-size:1.2rem;text-decoration:none;transition:all .3s">📢</a>
      </div>
      <div class="final-btns">
        <button class="final-btn primary" onclick="shareResult()">
          ${tr('share')}
        </button>
        <button class="final-btn secondary" onclick="playAgain()">
          ${tr('again')}
        </button>
        <a class="final-btn ghost" href="https://roko.help">
          ${tr('check')} \u2192
        </a>
        <a class="final-btn ghost" href="https://github.com/roko-help/roko/issues/new?template=report-scam.yml" target="_blank" style="font-size:.82rem;color:var(--text-dimmer)">
          ${tr('submit')} \u2192

      </div>
      <p style="margin-top:1.2rem;font-size:.78rem;color:var(--text-dimmer);text-align:center">${tr('exchange_cta')}</p>

    </div>
  `;
}

  localStorage.setItem('roko_quest_liked', '1');
  const btn = document.getElementById('questLikeBtn');
  if (btn) { btn.textContent = '❤️'; btn.style.borderColor = 'var(--danger)'; btn.style.transform = 'scale(1.2)'; setTimeout(() => btn.style.transform = 'scale(1)', 300); }

  };
  const text = shareTexts[curLang] || shareTexts.en;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(tr('copied')));
  } else {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast(tr('copied')); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function playAgain() {
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('finalScreen').classList.add('hidden');
  state = { step: 0, score: 0, results: [], answered: false };
  document.getElementById('gameView').classList.remove('hidden');
  document.getElementById('startLangSw').parentElement.style.display = 'none';
  renderStep();
}
</script>
