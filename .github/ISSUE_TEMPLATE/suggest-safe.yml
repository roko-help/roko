name: ✅ Suggest a safe domain
description: Suggest a verified, legitimate exchange or crypto service
title: "[SAFE] "
labels: ["safe-domain"]
body:
  - type: input
    id: domain
    attributes:
      label: Domain
      placeholder: "e.g. exchange.com"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is it safe?
      description: Regulatory licenses, years of operation, public company status, etc.
      placeholder: "Licensed by..., operating since..., public company..."
    validations:
      required: true
  - type: dropdown
    id: boost
    attributes:
      label: Suggested trust boost
      options:
        - "3 (minor / regional exchange)"
        - "5 (established exchange)"
        - "8 (well-known, licensed)"
        - "10-15 (major regulated / public company)"
    validations:
      required: true
